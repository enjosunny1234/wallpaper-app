<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expressive Wallpapers</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons (Sleek, modern icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Dynamic Background -->
    <div class="dynamic-bg"></div>
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal glass active">
        <div class="modal-content">
            <h2 id="authTitle">Sign In</h2>
            <p id="authSubtitle">Welcome back to Expressive Wallpapers.</p>
            
            <form id="authForm">
                <input type="text" id="authName" placeholder="Full Name" autocomplete="name" class="hidden">
                <input type="email" id="authEmail" placeholder="Email address" autocomplete="email" required>
                <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password" required>
                <p id="authError" class="error-text hidden">Invalid credentials.</p>
                
                <button type="submit" class="btn-primary w-full" id="authSubmitBtn">Sign In</button>
            </form>
            
            <p class="modal-hint mt-4">
                <span id="authToggleText">Don't have an account?</span> 
                <a href="#" id="authToggleBtn">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- API Key Modal -->
    <div id="apiKeyModal" class="modal glass hidden">
        <div class="modal-content">
            <h2>Welcome, <span id="welcomeName">User</span></h2>
            <p>To fetch stunning wallpapers, please enter your free Pexels API key.</p>
            <input type="text" id="apiKeyInput" placeholder="Enter Pexels API Key..." autocomplete="off">
            <button id="saveApiKeyBtn" class="btn-primary">Save Key & Start</button>
            <p class="modal-hint">You can get one at <a href="https://www.pexels.com/api/" target="_blank">pexels.com/api</a></p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app" class="hidden">
        <header class="glass header">
            <div class="header-container">
                <div class="logo">
                    <i class="ph-fill ph-aperture"></i>
                    <span>Expressive</span>
                </div>
                
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search incredible wallpapers...">
                </div>

                <div class="tabs">
                    <button class="tab active" data-type="photos" data-orientation="landscape">
                        <i class="ph ph-desktop"></i> Desktop
                    </button>
                    <button class="tab" data-type="photos" data-orientation="portrait">
                        <i class="ph ph-device-mobile"></i> Mobile
                    </button>
                    <button class="tab" data-type="videos" data-orientation="landscape">
                        <i class="ph ph-video-camera"></i> Animated
                    </button>
                </div>

                <div class="user-controls">
                    <button id="settingsBtn" class="btn-icon" title="API Settings">
                        <i class="ph ph-gear"></i>
                    </button>
                    <button id="logoutBtn" class="btn-icon" title="Sign Out">
                        <i class="ph ph-sign-out"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="gallery-container">
            <div id="gallery" class="gallery"></div>
            <div id="loader" class="loader">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Viewer -->
    <div id="viewerModal" class="viewer-modal">
        <button id="closeViewer" class="btn-icon close-viewer"><i class="ph ph-x"></i></button>
        <div id="viewerMediaContainer" class="viewer-media-container">
            <!-- Image or Video injected here -->
        </div>
        <div class="viewer-controls glass">
            <div class="photographer-info">
                <i class="ph ph-user"></i>
                <span id="viewerPhotographer">Photographer</span>
            </div>
            <a id="downloadBtn" href="#" target="_blank" class="btn-primary download-btn">
                <i class="ph ph-download-simple"></i> Download Original
            </a>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
