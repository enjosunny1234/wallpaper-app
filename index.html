<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expressive Wallpapers</title>
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dynamic-bg"></div>

    <div class="app-container">
        
        <!-- Auth Modal with Mascot -->
        <div id="authModal" class="modal glass active">
            
            <div class="mascot-container">
                <div class="speech-bubble">Sign Up Now and Explore Amazing Wallpapers!</div>
                <img src="assets/indian_mascot.png" alt="Friendly Mascot" class="mascot-img">
            </div>

            <div class="modal-content relative-z">
                <h2 id="authTitle" class="gradient-text">Sign In</h2>
                <p id="authSubtitle">Welcome back to Expressive Wallpapers.</p>
                <form id="authForm">
                    <input type="text" id="authName" placeholder="Full Name" class="hidden" autocomplete="name">
                    <input type="text" id="authEmailPhone" placeholder="Email Address or Mobile Number" required autocomplete="username">
                    <input type="password" id="authPassword" placeholder="Password (Min 8 chars)" required autocomplete="new-password">
                    <input type="password" id="authConfirmPassword" placeholder="Confirm Password" class="hidden" autocomplete="new-password">
                    
                    <div id="authError" class="error-msg hidden"></div>
                    <button type="submit" id="authSubmitBtn" class="btn-primary glow-effect">Sign In</button>
                </form>

                <p class="modal-hint mt-4">
                    <span id="authToggleText">Don't have an account?</span>
                    <a href="#" id="authToggleBtn">Sign Up</a>
                </p>
            </div>
        </div>

        <!-- Main Application -->
        <div id="app" class="hidden">
            <header class="glass header">
                <div class="header-container">
                    <div class="logo">
                        <img src="assets/logo.png" alt="Expressive Logo" class="app-logo" onerror="this.style.display='none'">
                        <span>Expressive</span>
                    </div>

                    <div class="search-bar">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Search incredible wallpapers...">
                    </div>

                    <div class="tabs">
                        <button class="tab active" data-type="photos" data-orientation="landscape">
                            <i class="ph ph-desktop"></i> Desktop
                        </button>
                        <button class="tab" data-type="photos" data-orientation="portrait">
                            <i class="ph ph-device-mobile"></i> Mobile
                        </button>
                        <button class="tab" data-type="videos" data-orientation="landscape">
                            <i class="ph ph-video-camera"></i> Animated
                        </button>
                    </div>

                    <div class="user-controls">
                        <button id="themeToggleBtn" class="btn-icon" title="Toggle Theme">
                            <i class="ph ph-sun"></i>
                        </button>
                        <button id="logoutBtn" class="btn-icon" title="Sign Out">
                            <i class="ph ph-sign-out"></i>
                        </button>
                    </div>
                </div>
            </header>

            <main class="gallery-container">
                <div id="gallery" class="gallery"></div>
                <div id="loader" class="loader">
                    <div class="spinner"></div>
                </div>
            </main>
        </div>

        <!-- Viewer Modal -->
        <div id="viewerModal" class="viewer glass hidden">
            <button id="closeViewer" class="btn-icon close-btn"><i class="ph ph-x"></i></button>
            <div id="viewerMediaContainer" class="viewer-media-container"></div>
            <div class="viewer-controls">
                <div class="photographer-info">
                    <i class="ph ph-user"></i>
                    <span id="viewerPhotographer"></span>
                </div>
                <a id="downloadBtn" class="btn-primary" href="#" download>
                    <i class="ph ph-download-simple"></i> Download High-Res
                </a>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
